<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Lupa Password — WebGIS Karang Harapan</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			body {
				background-color: #0f1a0a !important;
				background-image:
					radial-gradient(
						at 0% 0%,
						rgba(34, 197, 94, 0.05) 0px,
						transparent 50%
					),
					radial-gradient(
						at 100% 100%,
						rgba(139, 105, 20, 0.08) 0px,
						transparent 50%
					) !important;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
				font-family: "Plus Jakarta Sans", sans-serif;
			}
			.login-bento-card {
				background: rgba(255, 255, 255, 0.04);
				backdrop-filter: blur(25px);
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 20px;
				padding: 40px 32px;
				box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
				width: 100%;
				max-width: 440px;
			}
			.glass-input-group {
				position: relative;
				margin-bottom: 20px;
			}
			.glass-input-group i {
				position: absolute;
				left: 16px;
				top: 50%;
				transform: translateY(-50%);
				color: #9aaa8a;
				font-size: 14px;
			}
			.glass-input-field {
				width: 100%;
				height: 46px;
				background: rgba(0, 0, 0, 0.25) !important;
				border: 1px solid rgba(255, 255, 255, 0.08) !important;
				border-radius: 10px !important;
				padding-left: 46px !important;
				color: #f0ece4 !important;
				font-size: 14px;
			}
			.glass-input-field:focus {
				border-color: #16a34a !important;
				box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15) !important;
				outline: none;
			}
		</style>
	</head>
	<body>
		<div class="login-bento-card">
			<div class="text-center mb-4">
				<h4 style="font-weight: 700; color: #f0ece4; margin-bottom: 8px">
					Pemulihan Akun
				</h4>
				<p style="font-size: 13px; color: #9aaa8a; margin-bottom: 0">
					Masukkan alamat email terdaftar desa untuk menerima token tautan
					pemulihan.
				</p>
			</div>

			{% with messages = get_flashed_messages(with_categories=true) %} {% if
			messages %} {% for category, message in messages %}
			<div
				class="alert alert-danger mb-4"
				style="
					font-size: 13px;
					border-radius: 10px;
					background: rgba(239, 68, 68, 0.1);
					border: 1px solid rgba(239, 68, 68, 0.2);
					color: #f87171;
				"
			>
				<i class="fas fa-exclamation-circle me-2"></i>{{ message }}
			</div>
			{% endfor %} {% endif %} {% endwith %}

			<form method="POST">
				<div class="mb-4">
					<label
						class="form-label small"
						style="color: #f0ece4; font-weight: 500; margin-bottom: 6px"
						>Email Resmi Desa</label
					>
					<div class="glass-input-group">
						<input
							type="email"
							name="email"
							class="glass-input-field"
							placeholder="contoh@gmail.com"
							required
							autofocus
						/>
						<i class="fas fa-envelope"></i>
					</div>
				</div>
				<button
					type="submit"
					class="btn btn-success w-100"
					style="
						height: 44px;
						font-weight: 600;
						background-color: #16a34a;
						border: none;
						border-radius: 10px;
					"
				>
					Kirim Tautan Pemulihan
				</button>
			</form>
			<div class="text-center mt-4">
				<a
					href="{{ url_for('admin.login') }}"
					class="text-decoration-none small"
					style="color: #9aaa8a; font-size: 12px"
				>
					<i class="fas fa-arrow-left me-1"></i> Kembali ke Login
				</a>
			</div>
		</div>
	</body>
</html>
