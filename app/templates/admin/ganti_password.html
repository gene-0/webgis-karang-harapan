{% extends 'admin/base_admin.html' %} {% block title %}Ganti Password{% endblock
%} {% block page_title %}Ganti Password{% endblock %} {% block content %}
<div
	class="d-flex justify-content-center align-items-center"
	style="min-height: 70vh; animation: fadeSlideUp 0.4s ease both"
>
	<div class="bento-card" style="width: 100%; max-width: 480px; padding: 30px">
		<div class="mb-4 pb-2" style="border-bottom: 1px solid var(--border)">
			<div class="d-flex align-items-center gap-2 mb-1">
				<div
					style="
						width: 32px;
						height: 32px;
						border-radius: 8px;
						background: rgba(212, 168, 67, 0.15);
						display: flex;
						align-items: center;
						justify-content: center;
					"
				>
					<i
						class="fas fa-shield-alt"
						style="color: var(--accent-light); font-size: 14px"
					></i>
				</div>
				<p
					class="bento-section-label mb-0"
					style="font-size: 11px; letter-spacing: 0.5px"
				>
					Keamanan Akun
				</p>
			</div>
			<h5 style="font-weight: 700; color: var(--text-main); margin-top: 5px">
				Perbarui Password
			</h5>
		</div>

		<form method="POST">
			<div class="mb-3">
				<label
					class="form-label"
					style="font-size: 13px; font-weight: 500; color: var(--text-main)"
					>Password Lama</label
				>
				<input
					type="password"
					name="password_lama"
					class="form-control text-white"
					placeholder="Masukkan password saat ini"
					required
				/>
			</div>

			<div class="mb-3">
				<label
					class="form-label"
					style="font-size: 13px; font-weight: 500; color: var(--text-main)"
					>Password Baru</label
				>
				<input
					type="password"
					name="password_baru"
					class="form-control text-white"
					minlength="6"
					placeholder="Masukkan password baru"
					required
				/>
				<div
					class="form-text"
					style="font-size: 11px; color: var(--text-muted)"
				>
					<i class="fas fa-info-circle me-1"></i>Kombinasi minimal 6 karakter.
				</div>
			</div>

			<div class="mb-4">
				<label
					class="form-label"
					style="font-size: 13px; font-weight: 500; color: var(--text-main)"
					>Konfirmasi Password Baru</label
				>
				<input
					type="password"
					name="konfirmasi"
					class="form-control text-white"
					placeholder="Ulangi password baru"
					required
				/>
			</div>

			<div
				class="d-flex gap-2 justify-content-end pt-2"
				style="border-top: 1px solid var(--border-light)"
			>
				<a
					href="{{ url_for('admin.dashboard') }}"
					class="btn btn-outline-secondary px-3"
					style="font-size: 13px; font-weight: 500"
				>
					Batal
				</a>
				<button
					type="submit"
					class="btn btn-success px-4"
					style="
						font-size: 13px;
						font-weight: 600;
						background-color: #16a34a;
						border: none;
					"
				>
					<i class="fas fa-key me-2"></i>Simpan Perubahan
				</button>
			</div>
		</form>
	</div>
</div>
{% endblock %}
