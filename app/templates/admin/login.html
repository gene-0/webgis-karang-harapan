<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Login — WebGIS Karang Harapan</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<link
			href="{{ url_for('static', filename='css/style.css') }}"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>

		<style>
			body {
				background-color: #0f1a0a !important;
				background-image:
					radial-gradient(
						at 0% 0%,
						rgba(34, 197, 94, 0.05) 0px,
						transparent 50%
					),
					radial-gradient(
						at 100% 100%,
						rgba(139, 105, 20, 0.08) 0px,
						transparent 50%
					) !important;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
				font-family: "Plus Jakarta Sans", sans-serif;
			}

			.login-wrapper {
				width: 100%;
				max-width: 440px;
				animation: fadeSlideUp 0.5s ease both;
			}

			.login-bento-card {
				background: rgba(255, 255, 255, 0.04);
				backdrop-filter: blur(25px);
				-webkit-backdrop-filter: blur(25px);
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 20px;
				padding: 40px 32px;
				box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
			}

			.glass-input-group {
				position: relative;
				margin-bottom: 20px;
			}

			.glass-input-group i {
				position: absolute;
				left: 16px;
				top: 50%;
				transform: translateY(-50%);
				color: #9aaa8a;
				font-size: 14px;
				transition: color 0.2s;
				z-index: 4;
			}

			.glass-input-field {
				width: 100%;
				height: 46px;
				background: rgba(0, 0, 0, 0.25) !important;
				border: 1px solid rgba(255, 255, 255, 0.08) !important;
				border-radius: 10px !important;
				padding-left: 46px !important;
				padding-right: 16px !important;
				color: #f0ece4 !important;
				font-size: 14px;
				transition: all 0.2s ease;
			}

			.glass-input-field:focus {
				background: rgba(0, 0, 0, 0.35) !important;
				border-color: #16a34a !important;
				box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15) !important;
				outline: none;
			}

			.glass-input-field:focus + i {
				color: #22c55e;
			}

			@keyframes fadeSlideUp {
				from {
					opacity: 0;
					transform: translateY(20px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<div class="login-wrapper">
			<div class="login-bento-card">
				<div class="text-center mb-4">
					<div
						style="
							width: 58px;
							height: 58px;
							background: rgba(34, 197, 94, 0.12);
							border: 1px solid rgba(34, 197, 94, 0.25);
							border-radius: 16px;
							display: inline-flex;
							align-items: center;
							justify-content: center;
							margin-bottom: 16px;
						"
					>
						<i
							class="fas fa-map-marked-alt"
							style="font-size: 24px; color: #22c55e"
						></i>
					</div>
					<h4
						style="
							font-weight: 700;
							color: #f0ece4;
							margin-bottom: 4px;
							letter-spacing: -0.5px;
						"
					>
						WebGIS Admin
					</h4>
					<p style="font-size: 13px; color: #9aaa8a; margin-bottom: 0">
						Kelurahan Karang Harapan
					</p>
				</div>

				{% with messages = get_flashed_messages(with_categories=true) %} {% if
				messages %} {% for category, message in messages %}
				<div
					class="alert mb-4"
					style="
						font-size: 13px;
						border-radius: 10px;
						background: {{ 'rgba(34, 197, 94, 0.12)' if category == 'success' else 'rgba(239, 68, 68, 0.1)' }};
						border: 1px solid {{ 'rgba(34, 197, 94, 0.25)' if category == 'success' else 'rgba(239, 68, 68, 0.2)' }};
						color: {{ '#4ade80' if category == 'success' else '#f87171' }};
					"
				>
					<i
						class="{{ 'fas fa-check-circle' if category == 'success' else 'fas fa-exclamation-circle' }} me-2"
					></i
					>{{ message }}
				</div>
				{% endfor %} {% endif %} {% endwith %}

				<form method="POST">
					<div class="mb-3">
						<label
							class="form-label small"
							style="color: #f0ece4; font-weight: 500; margin-bottom: 6px"
							>Username</label
						>
						<div class="glass-input-group">
							<input
								type="text"
								name="username"
								class="glass-input-field"
								placeholder="Masukkan username Anda"
								required
								autofocus
							/>
							<i class="fas fa-user"></i>
						</div>
					</div>

					<div class="mb-2">
						<div class="d-flex justify-content-between align-items-center mb-1">
							<label
								class="form-label small mb-0"
								style="color: #f0ece4; font-weight: 500"
								>Password</label
							>
							<a
								href="{{ url_for('admin.lupa_password') }}"
								class="small text-decoration-none"
								style="font-size: 12px; color: #9aaa8a; transition: color 0.2s"
								onmouseover="this.style.color = '#22c55e'"
								onmouseout="this.style.color = '#9aaa8a'"
							>
								Lupa Password?
							</a>
						</div>
						<div class="glass-input-group">
							<input
								type="password"
								name="password"
								class="glass-input-field"
								placeholder="Masukkan password Anda"
								required
							/>
							<i class="fas fa-lock"></i>
						</div>
					</div>

					<button
						type="submit"
						class="btn btn-success w-100 d-flex align-items-center justify-content-center"
						style="
							height: 44px;
							font-size: 14px;
							font-weight: 600;
							background-color: #16a34a;
							border: none;
							border-radius: 10px;
							box-shadow: 0 4px 16px rgba(22, 163, 74, 0.25);
							transition: all 0.2s;
						"
					>
						<i class="fas fa-sign-in-alt me-2"></i> Masuk ke Dashboard
					</button>
				</form>
			</div>

			<div class="text-center mt-4">
				<a
					href="{{ url_for('public.index') }}"
					class="text-decoration-none small d-inline-flex align-items-center gap-1"
					style="
						color: #9aaa8a;
						font-size: 12px;
						opacity: 0.75;
						transition: all 0.2s;
					"
					onmouseover="
						this.style.opacity = 1;
						this.style.color = '#f0ece4';
					"
					onmouseout="
						this.style.opacity = 0.75;
						this.style.color = '#9aaa8a';
					"
				>
					<i class="fas fa-arrow-left" style="font-size: 10px"></i> Kembali ke
					Peta Utama WebGIS
				</a>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
